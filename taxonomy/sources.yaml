national_news:
- name: Associated Press (AP News)
  type: Wire service
  rss_feed: https://apnews.com/apf-services/v2/homepage.rss
  coverage: General US news, politics, government
  reliability: high
  notes: Primary source for breaking news distribution
- name: Reuters
  type: Wire service
  rss_feed: https://www.reutersagency.com/feed/?taxonomy=best-topics&output=rss
  coverage: US politics, government, elections
  reliability: high
  notes: International perspective on US governance
- name: NPR
  type: Broadcast/Digital
  rss_feed: https://feeds.npr.org/1001/rss.xml
  coverage: US news, politics, democracy-focused reporting
  reliability: high
  notes: Strong coverage of voting rights, civil rights
- name: New York Times
  type: Newspaper
  rss_feed: https://rss.nytimes.com/services/xml/rss/nyt/US.xml
  coverage: Investigative reporting, politics, civil rights
  reliability: high
  notes: Detailed policy analysis and investigation
- name: Washington Post
  type: Newspaper
  rss_feed: https://feeds.washingtonpost.com/rss/politics
  coverage: Politics, government accountability, investigations
  reliability: high
  notes: Federal government focus
- name: BBC News (US & Canada)
  type: Broadcast/Digital
  rss_feed: https://feeds.bbc.co.uk/news/world/us_and_canada/rss.xml
  coverage: US democracy, elections, civil unrest
  reliability: high
  notes: International perspective on US events
- name: ProPublica
  type: Nonprofit investigative journalism
  rss_feed: https://www.propublica.org/feeds/big-story
  coverage: Government accountability, civil rights, elections
  reliability: high
  notes: Deep investigative work on democracy issues
- name: Politico
  type: Politics/Government news
  rss_feed: https://www.politico.com/feed/news-updates.xml
  coverage: Federal politics, Congress, White House
  reliability: high
  notes: Congress and executive branch focus
government_sources:
- name: Congressional Record
  type: Official government record
  url: https://www.congress.gov/congressional-record
  coverage: Official statements, votes, testimony
  reliability: authoritative
  notes: Primary source for congressional activity
- name: Federal Register
  type: Official government publication
  rss_feed: https://www.federalregister.gov/documents/search.atom
  coverage: Executive orders, agency rules, notices
  reliability: authoritative
  notes: Track executive action, regulatory changes
- name: Supreme Court Opinions
  type: Judicial opinions
  rss_feed: https://www.supremecourt.gov/xml/feed_pressreleases.xml
  coverage: SCOTUS decisions affecting voting rights, civil rights, elections
  reliability: authoritative
  notes: Landmark decisions on democracy issues
- name: Court Listener
  type: Court opinion aggregator
  url: https://www.courtlistener.com
  coverage: Federal and state court opinions
  reliability: high
  notes: Searchable database of court filings
- name: Government Accountability Office (GAO)
  type: Congressional oversight agency
  url: https://www.gao.gov
  coverage: Government investigations, audits, reports
  reliability: authoritative
  notes: Official audits of government programs and spending
- name: Office of Inspector General Reports
  type: Executive branch oversight
  url: https://www.ignet.gov
  coverage: Agency investigations, audits, misconduct findings
  reliability: authoritative
  notes: Distributed across multiple agencies
watchdog_sources:
- name: Brennan Center for Justice
  type: Democracy watchdog
  url: https://www.brennancenter.org
  coverage: Voting rights, campaign finance, government accountability
  reliability: high
  notes: Primary source on election integrity issues
- name: Common Cause
  type: Democracy advocacy
  url: https://www.commoncause.org
  coverage: Campaign finance, voting rights, redistricting
  reliability: high
  notes: Tracks gerrymandering and voter suppression
- name: Democracy Forward
  type: Civil rights/government accountability
  url: https://democracyforward.org
  coverage: Executive overreach, ethics, civil rights
  reliability: high
  notes: Litigation and advocacy on democracy issues
- name: Election Assistance Commission (EAC)
  type: Federal election authority
  url: https://www.eac.gov
  coverage: Election security, voting systems, data
  reliability: authoritative
  notes: Official source on election administration
- name: Fair Fight Action
  type: Voting rights advocacy
  url: https://www.fairfightaction.com
  coverage: Voter suppression, ballot access, elections
  reliability: high
  notes: State-level voting rights focus
- name: Lawyers' Committee for Civil Rights Under Law
  type: Civil rights law organization
  url: https://lawyerscommittee.org
  coverage: Civil rights enforcement, voting rights, discrimination
  reliability: high
  notes: Legal analysis and litigation on rights issues
- name: American Civil Liberties Union (ACLU)
  type: Civil rights advocacy
  url: https://www.aclu.org
  coverage: First Amendment, due process, civil rights
  reliability: high
  notes: Broad civil rights coverage
- name: Project on Government Oversight (POGO)
  type: Nonpartisan government watchdog
  url: https://www.pogo.org
  coverage: Federal agency oversight, IG firings, contractor fraud, executive overreach, whistleblower protection
  reliability: high
  notes: Founded 1981; trains Congressional oversight staff from both parties; charity governance benchmarks met. Inheriting Center for Public Integrity's archive after CPI shut down March 2025
- name: Lawfare
  type: National security law analysis
  rss_feed: https://www.lawfaremedia.org/rss.xml
  coverage: National security law, DOJ analysis, intelligence community, constitutional law, executive power
  reliability: high
  notes: Least Biased / Very High factual per MBFC — strongest credibility profile on the list. Cooperated with Brookings; Benjamin Wittes editor-in-chief; bipartisan staff
- name: SPLC Hatewatch
  type: Hate group and extremism tracker
  url: https://www.splcenter.org/hatewatch
  coverage: Documented hate-group activity, extremist organizing, civil rights litigation
  reliability: high
  notes: Left / High factual per MBFC. Cite their factual incident reporting, not their hate-group list designations — methodology has produced documented misclassifications (Maajid Nawaz settlement). FBI scrutiny over use of SPLC data is also relevant context
press_freedom_sources:
- name: Reporters Without Borders (RSF)
  type: Press freedom organization
  url: https://rsf.org
  coverage: Press freedom, journalist safety, government attacks on media
  reliability: high
  notes: International perspective on US press freedom
- name: Committee to Protect Journalists (CPJ)
  type: Press freedom organization
  url: https://cpj.org
  coverage: Journalist arrests, prosecutions, government threats
  reliability: high
  notes: Tracks attacks on journalists globally and in US
- name: Freedom of the Press Foundation
  type: Press freedom advocacy
  url: https://freedom.press
  coverage: First Amendment, surveillance, press freedom
  reliability: high
  notes: Digital rights and press freedom focus
specialized_sources:
- name: Democracy Now!
  type: Independent news
  url: https://www.democracynow.org
  coverage: Government accountability, protests, civil rights
  reliability: high
  notes: Democracy and social justice focus
- name: The Guardian (US)
  type: Newspaper
  rss_feed: https://www.theguardian.com/us-news/rss
  coverage: US politics, government, civil rights
  reliability: high
  notes: International outlet with strong US coverage
- name: SCOTUS Blog
  type: Supreme Court analysis
  url: https://www.scotusblog.com
  coverage: Supreme Court opinions, decisions affecting rights
  reliability: high
  notes: Expert analysis of SCOTUS decisions
- name: Inside Elections
  type: Election analysis
  url: https://insideelections.com
  coverage: Elections, voting rights, redistricting
  reliability: high
  notes: Expert analysis of election law and trends
- name: Rewire News Group
  type: Nonprofit investigative news
  rss_feed: https://rewirenewsgroup.com/feed/
  coverage: Reproductive and sexual health, rights, and justice; courts coverage; immigration and economic justice
  reliability: high
  notes: High factual rating but pro-choice editorial posture — cite the reporting, not the commentary. Strong on reproductive-rights litigation
- name: Reveal / Center for Investigative Reporting
  type: Nonprofit investigative newsroom
  rss_feed: https://revealnews.org/feed/
  coverage: Threats to democracy, immigration, policing and legal system, gender violence, climate, economic inequality
  reliability: high
  notes: Multiple Pulitzers and Peabodys; merged with Mother Jones (Feb 2024) but distinct brand; weekly hour-long PRX radio show
- name: The 19th News
  type: Nonprofit newsroom
  rss_feed: https://19thnews.org/feed/
  coverage: Gender, politics, policy, and power — voting rights, reproductive policy, women in elected office, LGBTQ+ legal protections
  reliability: high
  notes: Self-described nonpartisan through a gender lens; free to republish; built The 19th News Network in 2024
- name: The Intercept
  type: Nonprofit investigative news
  rss_feed: https://theintercept.com/feed/?lang=en
  coverage: National security, surveillance, digital privacy, civil liberties, government secrets
  reliability: medium
  notes: Mostly Factual rating (one tier below the rest of the list) — verify load-bearing claims against primary documents. Fills surveillance and intelligence beat the rest of the list misses
- name: More Perfect Union
  type: Nonprofit news / video journalism
  url: https://perfectunion.us/
  coverage: Labor, economic policy, corporate accountability
  reliability: medium
  notes: Mostly Factual rating; pairs reporting with activism (openly disclosed); Sidney/Hillman/Emmy awards. Founded by Faiz Shakir (former Bernie Sanders campaign manager) — lineage worth flagging
- name: ICT News (Indian Country Today)
  type: Nonprofit news / public broadcasting
  rss_feed: https://ictnews.org/feed
  coverage: Treaty rights, tribal sovereignty, federal-tribal relations, ICWA, reservation voting access, Indigenous communities
  reliability: high
  notes: Largest US Native American news organization; 45-year history; INN-member. Fills Native/Indigenous democracy gap the rest of the list does not cover
- name: Floodlight News
  type: Nonprofit investigative news
  url: https://floodlightnews.org/
  coverage: Fossil-fuel money in politics, regulatory capture, climate disinformation, corporate ownership of local news
  reliability: high
  notes: Explicit nonpartisan framing; co-publishes with The Guardian US; multi-step fact-checking process. Reports republished in ~500 outlets across 47 states in 2025
- name: The Advocate
  type: LGBTQ magazine and digital news
  rss_feed: https://www.advocate.com/feeds/feed.rss
  coverage: State anti-LGBTQ legislation, federal LGBTQ policy, civil rights court cases, hate-crime prosecution
  reliability: high
  notes: Oldest and largest US LGBTQ publication (founded 1967); High factual rating; Ad Fontes "Most Reliable" category
- name: Just Security
  type: Academic legal forum
  rss_feed: https://www.justsecurity.org/feed/
  coverage: US national security law and policy, constitutional law, intelligence community oversight
  reliability: high
  notes: NYU Law / Reiss Center on Law and Security; Left-Center / High factual; complements Lawfare on national security legal analysis
- name: The Marshall Project
  type: Nonprofit investigative newsroom
  rss_feed: https://www.themarshallproject.org/rss/recent.rss
  coverage: US criminal justice system, DOJ, prosecutorial conduct, federal policing, prison conditions
  reliability: high
  notes: Multiple Pulitzers (2016 Explanatory, 2021 National Reporting); founded by Neil Barsky with Bill Keller (former NYT exec editor) as first editor; explicitly not advocacy
- name: Religion News Service (RNS)
  type: News wire / nonprofit
  rss_feed: https://religionnews.com/feed/
  coverage: Religious liberty, Christian nationalism, religious-right legal strategy, faith communities
  reliability: high
  notes: Founded 1934; Left-Center / High factual; syndicated to 170+ outlets (WaPo, NPR, Chicago Tribune). Covers religion beat absent from the rest of the list
- name: Mother Jones
  type: Investigative magazine
  rss_feed: https://www.motherjones.com/feed/
  coverage: Investigative reporting on politics, money in politics, environment, criminal justice
  reliability: high
  notes: Founded 1976; Left-Center to Left / High factual; merged with CIR/Reveal in Feb 2024 but distinct brand and beat
- name: Stateline / States Newsroom
  type: Nonprofit state news network
  url: https://stateline.org/
  coverage: State-level policy and politics; State Houses, election administration, gerrymandering, voting laws across 50 capitals
  reliability: high
  notes: Stateline (founded 1998 by Pew) joined States Newsroom in May 2023; network operates in all 50 state capitals (39 wholly-owned 501(c)(3) newsrooms). Left / High factual. Fills state-level democracy gap
- name: Democracy Docket
  type: Election law litigation tracker
  rss_feed: https://www.democracydocket.com/feed/
  coverage: Voting rights litigation, redistricting cases, ballot access challenges, election certification disputes
  reliability: high
  notes: High factual per MBFC; founded by Democratic lawyer Marc Elias (Elias Law Group) — claims editorial firewall. Cite the case docket and filings, not the commentary. Strongest single source for voting-rights litigation tracking
- name: Bolts Magazine
  type: Nonprofit digital magazine
  url: https://boltsmag.org/
  coverage: State and local democracy — prosecutors, sheriffs, election administration, voting rights, local criminal justice
  reliability: high
  notes: No third-party bias rating yet (founded Feb 2022 by Daniel Nichanian); INN member with stated editorial firewall. Best available source for state/local democracy coverage
- name: Electronic Frontier Foundation (EFF)
  type: Civil liberties watchdog / news
  rss_feed: https://www.eff.org/rss/updates.xml
  coverage: Government surveillance, digital privacy, FBI/NSA accountability, journalist surveillance, free speech online
  reliability: high
  notes: Founded 1990; Left-Center / High factual. Both watchdog and analysis publisher — civil-liberties counterpart to ACLU for the digital domain
independent_journalists:
- name: Marcy Wheeler (emptywheel)
  type: Independent journalist / blog
  url: https://emptywheel.net
  coverage: Surveillance, intelligence community, DOJ, FISA — works primarily from declassified documents
  reliability: high
  notes: 20+ year track record; Sidney Hillman Award, AccessNow Internet Human Rights hero. Per CJR "few people are wrong less often." Live-blogged Scooter Libby trial; uncovered KSM waterboarding count
- name: Steve Vladeck (One First)
  type: Academic Substack
  url: https://www.stevevladeck.com
  coverage: Supreme Court rulings and procedure, shadow docket, constitutional law
  reliability: high
  notes: Georgetown Law professor; CNN SCOTUS analyst; NYT-bestselling author (The Shadow Docket). Academic-tier analysis
- name: Joyce Vance (Civil Discourse)
  type: Substack
  url: https://joycevance.substack.com
  coverage: DOJ analysis, federal prosecution, rule-of-law issues
  reliability: high
  notes: Former US Attorney (N.D. Alabama); University of Alabama law professor; MSNBC legal analyst. Insider DOJ perspective
- name: Brian Klaas (The Garden of Forking Paths)
  type: Academic Substack
  url: https://www.forkingpaths.co
  coverage: Comparative democracy, authoritarianism, political violence, power and corruption
  reliability: high
  notes: UCL Associate Professor in Global Politics; Atlantic contributing writer; author of five books on power/corruption/democracy
- name: Judd Legum (Popular Information)
  type: Substack
  url: https://popular.info
  coverage: Corporate accountability, dark money, political donations to extremist causes, voter suppression
  reliability: high
  notes: Left / High factual per MBFC; impactful corporate-accountability reporting (sparked corporate policy changes). Founder/former editor of ThinkProgress — partisan lineage explicit but factual record clean. No paywall
