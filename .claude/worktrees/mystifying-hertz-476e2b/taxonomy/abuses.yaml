# Specific abuses, each tied to one of the 12 ideals in ideals.yaml.
# Entries reference abuses by slug. Adding a new abuse requires a PR
# updating this file. The build fails if an entry references an abuse
# that doesn't appear here.

# --- Free and fair elections ---
- slug: voter-suppression
  ideal: free-and-fair-elections
  title: "Voter suppression"
  description: "Laws, policies, or actions designed to make voting harder for specific populations."

- slug: gerrymandering
  ideal: free-and-fair-elections
  title: "Gerrymandering"
  description: "Drawing district lines to predetermine outcomes beyond routine political-line redistricting."

- slug: election-denial
  ideal: free-and-fair-elections
  title: "Election denial"
  description: "Officeholders or candidates publicly denying legitimate election results."

- slug: certification-refusal
  ideal: free-and-fair-elections
  title: "Refusal to certify"
  description: "Certifying officials refusing to perform their ministerial duty to certify valid results."

- slug: voter-intimidation
  ideal: free-and-fair-elections
  title: "Voter intimidation"
  description: "Tactics intended to deter eligible voters from voting."

- slug: election-worker-intimidation
  ideal: free-and-fair-elections
  title: "Election worker intimidation"
  description: "Threats, harassment, or coercion directed at people who administer elections."

- slug: disinformation-campaigns
  ideal: free-and-fair-elections
  title: "Coordinated election disinformation"
  description: "Organized campaigns to spread false information about voting or election outcomes."

- slug: post-election-overturning-attempts
  ideal: free-and-fair-elections
  title: "Attempts to overturn results post-election"
  description: "Efforts to reverse legitimate election outcomes after the vote."

- slug: alternate-electors
  ideal: free-and-fair-elections
  title: "Alternate-elector schemes"
  description: "Submitting unauthorized slates of electors or related fraudulent schemes."

- slug: refusal-to-concede
  ideal: free-and-fair-elections
  title: "Refusal to concede a legitimate loss"
  description: "Sustained refusal by losing candidates or their backers to accept legitimate election outcomes."

# --- Rule of law and equal application ---
- slug: defying-court-orders
  ideal: rule-of-law
  title: "Defying court orders"
  description: "Officials or agencies refusing to comply with binding court orders."

- slug: selective-prosecution
  ideal: rule-of-law
  title: "Selective prosecution"
  description: "Bringing or declining cases based on political alignment rather than the law and evidence."

- slug: pardons-for-allies-or-self
  ideal: rule-of-law
  title: "Pardons for allies or self"
  description: "Using pardon power to shield political allies, family members, or oneself from accountability."

- slug: politicized-investigations
  ideal: rule-of-law
  title: "Politicized investigations"
  description: "Opening, suppressing, or steering investigations on political grounds."

- slug: ignoring-statutory-requirements
  ideal: rule-of-law
  title: "Ignoring statutory requirements"
  description: "Refusing to follow procedures, reporting requirements, or limits that the law imposes."

- slug: selective-non-enforcement
  ideal: rule-of-law
  title: "Selective non-enforcement"
  description: "Declining to enforce duly enacted law for political reasons."

# --- Separation of powers and independent oversight ---
- slug: executive-overreach
  ideal: separation-of-powers
  title: "Executive overreach"
  description: "Executive actions exceeding constitutional or statutory authority."

- slug: bypassing-congress
  ideal: separation-of-powers
  title: "Bypassing Congress"
  description: "Substantive lawmaking via executive action where Congress is the proper actor."

- slug: defying-subpoenas
  ideal: separation-of-powers
  title: "Defying subpoenas"
  description: "Refusing to comply with lawful legislative or judicial subpoenas."

- slug: weaponizing-doj
  ideal: separation-of-powers
  title: "Weaponizing the Justice Department"
  description: "Using DOJ resources to target political opponents or shield allies."

- slug: ig-firings
  ideal: separation-of-powers
  title: "Inspector General firings"
  description: "Removing inspectors general to obstruct oversight."

- slug: watchdog-defunding
  ideal: separation-of-powers
  title: "Watchdog defunding"
  description: "Stripping resources from oversight bodies to neutralize them."

- slug: obstruction-of-oig-investigations
  ideal: separation-of-powers
  title: "Obstruction of OIG investigations"
  description: "Interfering with active inspector-general inquiries."

- slug: retaliation-against-whistleblowers
  ideal: separation-of-powers
  title: "Retaliation against whistleblowers"
  description: "Punishing those who report wrongdoing through lawful channels."

- slug: attacks-on-judicial-independence
  ideal: separation-of-powers
  title: "Attacks on judicial independence"
  description: "Threats, court-packing schemes, or campaigns to pressure judges over rulings."

- slug: lying-to-congress
  ideal: separation-of-powers
  title: "Lying to Congress"
  description: "Knowingly false statements in sworn or unsworn testimony to congressional bodies."

